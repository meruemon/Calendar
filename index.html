<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>研究室スケジュール</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display&family=Space+Mono&display=swap" rel="stylesheet">
<style>
/* ═══ VARIABLES ═══ */
:root {
  --bg:#F7F5F0; --surface:#fff; --ink:#1A1A18; --ink-m:#6B6860; --ink-f:#B5B2AA;
  --accent:#2D5A8B; --accent-l:#E8EFF6; --accent-d:#1e3f63;
  --bd:rgba(26,26,24,.10); --bd2:rgba(26,26,24,.20);
  --r:10px; --rl:16px;
  --sh:0 2px 8px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.6;}

/* ═══ LOCK SCREEN ═══ */
#lock{position:fixed;inset:0;z-index:9999;background:#111210;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:2rem;}
#lock.gone{display:none;}
.lock-mark{width:56px;height:56px;background:var(--accent);border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;}
.lock-h{font-family:'DM Serif Display',serif;font-size:22px;color:#F7F5F0;margin-bottom:4px;letter-spacing:-.3px;}
.lock-s{font-size:12px;color:#555;margin-bottom:32px;}
.dots{display:flex;gap:14px;margin-bottom:26px;height:24px;align-items:center;}
.dot{width:13px;height:13px;border-radius:50%;border:1.5px solid #3a3a38;background:transparent;transition:background .12s,border-color .12s;}
.dot.on{background:#F7F5F0;border-color:#F7F5F0;}
.err .dot{border-color:#ef4444;background:#ef4444;animation:shake .38s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}60%{transform:translateX(7px)}}
.pad{display:grid;grid-template-columns:repeat(3,68px);gap:9px;}
.key{height:54px;border:1px solid #2e2e2c;background:#1e1e1c;border-radius:10px;color:#E8E6E0;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;user-select:none;transition:background .1s,border-color .1s;-webkit-tap-highlight-color:transparent;}
.key:hover{background:#282826;border-color:#444;}
.key:active{transform:scale(.93);}
.key.del{font-size:14px;color:#666;}
.key.blank{pointer-events:none;background:transparent;border-color:transparent;}
.lock-tip{font-size:11px;color:#3a3a38;margin-top:18px;}

/* ═══ HEADER ═══ */
.hd{background:var(--surface);border-bottom:1px solid var(--bd);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.hd-l{display:flex;align-items:center;gap:12px;}
.hd-mark{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hd h1{font-family:'DM Serif Display',serif;font-size:18px;font-weight:400;letter-spacing:-.2px;white-space:nowrap;}
.hd-sub{font-size:11px;color:var(--ink-m);margin-top:1px;}
.hd-r{display:flex;align-items:center;gap:8px;flex-shrink:0;}

/* ═══ BUTTONS ═══ */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:var(--r);border:1px solid var(--bd2);background:white;color:var(--ink);font-family:'Noto Sans JP',sans-serif;font-size:12px;cursor:pointer;transition:background .12s,transform .1s;white-space:nowrap;}
.btn:hover{background:var(--bg);}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.45;pointer-events:none;}
.btn.p{background:var(--accent);color:white;border-color:var(--accent);}
.btn.p:hover{background:var(--accent-d);}
.vtog{display:flex;background:var(--bg);border:1px solid var(--bd2);border-radius:var(--r);overflow:hidden;}
.vtog button{padding:5px 14px;border:none;background:transparent;font-family:'Noto Sans JP',sans-serif;font-size:12px;cursor:pointer;color:var(--ink-m);transition:all .12s;white-space:nowrap;}
.vtog button.on{background:white;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08);border-radius:calc(var(--r) - 1px);font-weight:500;}

/* ═══ STATUS ═══ */
.sdot{width:7px;height:7px;border-radius:50%;background:var(--ink-f);display:inline-block;flex-shrink:0;}
.sdot.live{background:#22c55e;}
.sdot.spin{background:#f59e0b;animation:blink 1s ease-in-out infinite;}
.sdot.err{background:#ef4444;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#stxt{font-size:11px;color:var(--ink-m);}

/* ═══ MAIN ═══ */
.main{max-width:1120px;margin:0 auto;padding:1.5rem;}
.pnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;gap:8px;}
.plabel{font-family:'DM Serif Display',serif;font-size:22px;letter-spacing:-.4px;line-height:1.1;}
.psub{font-size:11px;color:var(--ink-m);font-weight:300;margin-top:3px;}
.navbts{display:flex;gap:5px;align-items:center;flex-shrink:0;}
.nbtn{width:30px;height:30px;border:1px solid var(--bd2);background:white;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ink-m);transition:all .12s;-webkit-tap-highlight-color:transparent;}
.nbtn:hover{background:var(--bg);color:var(--ink);}
.nbtn:active{transform:scale(.92);}

/* ═══ WEEK GRID ═══ */
.wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:1.25rem;}
.dcell{background:var(--surface);border-radius:var(--rl);border:1px solid var(--bd);padding:12px 10px;min-height:190px;box-shadow:var(--sh);transition:border-color .12s;}
.dcell.today{border-color:var(--accent);border-width:1.5px;}
.dcell:hover{border-color:var(--bd2);}
.dh{margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--bd);}
.dname{font-size:9px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-m);margin-bottom:1px;}
.dnum{font-size:19px;font-family:'Space Mono',monospace;color:var(--ink);line-height:1;}
.dcell.today .dnum{color:var(--accent);}
.tdot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent);margin-left:3px;vertical-align:middle;}

/* ═══ MONTH GRID ═══ */
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:1.25rem;border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh);}
.mdow{background:var(--surface);padding:7px 0;text-align:center;font-size:10px;font-weight:500;letter-spacing:.06em;color:var(--ink-m);border-bottom:1px solid var(--bd);text-transform:uppercase;}
.mdow.sat{color:#2D5A8B;}.mdow.sun{color:#dc2626;}
.mcell{background:var(--surface);min-height:100px;padding:6px;border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);}
.mcell:nth-child(7n){border-right:none;}
.mcell.other{background:#FAFAF8;}.mcell.today{background:#EEF4FB;}
.mdn{font-family:'Space Mono',monospace;font-size:11px;color:var(--ink-m);margin-bottom:4px;display:inline-block;width:20px;height:20px;line-height:20px;text-align:center;border-radius:50%;}
.mcell.today .mdn{background:var(--accent);color:white;}
.mcell.other .mdn{color:var(--ink-f);}
.mcell.sat .mdn{color:#2D5A8B;}.mcell.sun .mdn{color:#dc2626;}
.mcell.today.sat .mdn,.mcell.today.sun .mdn{color:white;}

/* ═══ PILLS ═══ */
.evlist{display:flex;flex-direction:column;gap:4px;}
.pill{border-radius:5px;padding:4px 7px;font-size:10.5px;cursor:pointer;line-height:1.35;border-left:3px solid var(--accent);background:var(--accent-l);color:var(--accent);transition:filter .1s,transform .1s;}
.pill.busy{opacity:.5;cursor:default;}
.pill:not(.busy):hover{filter:brightness(.93);transform:translateY(-1px);}
.mpill{font-size:9.5px;border-radius:3px;padding:1px 4px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:2px solid var(--accent);background:var(--accent-l);color:var(--accent);display:block;transition:filter .1s;}
.mpill:hover{filter:brightness(.93);}
.mpill.busy{opacity:.5;cursor:default;}
.t-meeting{border-left-color:#7c5cbf!important;background:#f0ebfa!important;color:#5b3fa0!important;}
.t-seminar{border-left-color:#d97706!important;background:#fef3c7!important;color:#b45309!important;}
.t-deadline{border-left-color:#dc2626!important;background:#fee2e2!important;color:#991b1b!important;}
.t-lecture{border-left-color:#16a34a!important;background:#dcfce7!important;color:#15803d!important;}
.t-other{border-left-color:#6b7280!important;background:#f3f4f6!important;color:#374151!important;}
.et{font-family:'Space Mono',monospace;font-size:9.5px;opacity:.7;display:block;margin-bottom:1px;}
.etitle{font-weight:500;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.more{font-size:10px;color:var(--ink-f);text-align:center;padding:2px;cursor:default;}
.noev{font-size:10.5px;color:var(--ink-f);text-align:center;padding:.8rem 0;}

/* ═══ DETAIL ═══ */
.ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(10,10,8,.45);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:1rem;}
.ov.open{display:flex;}
.dcard{background:var(--surface);border-radius:var(--rl);padding:1.75rem;max-width:460px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.18);position:relative;animation:up .18s ease;}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.dcls{position:absolute;top:.9rem;right:.9rem;width:26px;height:26px;border:none;background:var(--bg);border-radius:50%;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;color:var(--ink-m);}
.dcls:hover{background:#e5e3dc;}
.dbadge{display:inline-block;font-size:10.5px;padding:2px 10px;border-radius:20px;font-weight:500;margin-bottom:8px;}
.dtitle{font-family:'DM Serif Display',serif;font-size:21px;color:var(--ink);margin-bottom:.9rem;letter-spacing:-.2px;line-height:1.3;}
.drow{display:flex;gap:9px;align-items:flex-start;font-size:12.5px;color:var(--ink-m);margin-bottom:7px;}
.dico{width:15px;flex-shrink:0;margin-top:2px;font-size:12px;}
.ddesc{margin-top:.9rem;padding-top:.9rem;border-top:1px solid var(--bd);font-size:12.5px;color:var(--ink-m);line-height:1.75;white-space:pre-wrap;word-break:break-word;}

/* ═══ LEGEND ═══ */
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:1.25rem;padding:10px 14px;background:var(--surface);border-radius:var(--r);border:1px solid var(--bd);}
.li{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--ink-m);}
.ld{width:7px;height:7px;border-radius:2px;}

/* ═══ FOOTER ═══ */
footer{text-align:center;font-size:11px;color:var(--ink-f);padding:1.5rem;margin-top:.5rem;border-top:1px solid var(--bd);}

/* ═══ ERROR BOX ═══ */
.ebox{background:var(--surface);border-radius:var(--rl);border:1px solid var(--bd);padding:2.5rem 2rem;text-align:center;}

/* ═══ RESPONSIVE ═══ */
@media(max-width:640px){
  .hd{padding:0 1rem;height:54px;}
  .hd h1{font-size:15px;}
  .hd-sub{display:none;}
  #stxt{display:none;}
  .main{padding:1rem;}
  .plabel{font-size:18px;}
  /* Week → vertical list */
  .wgrid{grid-template-columns:1fr;gap:6px;}
  .dcell{min-height:unset;}
  .dcell.wkend-hide{display:none;}
  /* Month compact */
  .mcell{min-height:68px;padding:4px;}
  .mdn{font-size:10px;width:18px;height:18px;line-height:18px;}
}
@media(min-width:641px) and (max-width:1023px){
  .wgrid{grid-template-columns:repeat(4,1fr);}
  .dcell{min-height:160px;}
}
@media(min-width:1024px){
  .main{padding:2rem;}
}
</style>
</head>
<body>

<!-- ═══ LOCK ═══ -->
<div id="lock">
  <div class="lock-mark">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <rect x="4" y="10" width="14" height="10" rx="2" fill="white" opacity=".92"/>
      <path d="M7 10V7a4 4 0 018 0v3" stroke="white" stroke-width="1.7" stroke-linecap="round" fill="none"/>
    </svg>
  </div>
  <div class="lock-h">研究室スケジュール</div>
  <div class="lock-s">Lab Schedule — Enter passcode</div>
  <div class="dots" id="dots">
    <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  </div>
  <div class="pad">
    <button class="key" onclick="kp('1')">1</button>
    <button class="key" onclick="kp('2')">2</button>
    <button class="key" onclick="kp('3')">3</button>
    <button class="key" onclick="kp('4')">4</button>
    <button class="key" onclick="kp('5')">5</button>
    <button class="key" onclick="kp('6')">6</button>
    <button class="key" onclick="kp('7')">7</button>
    <button class="key" onclick="kp('8')">8</button>
    <button class="key" onclick="kp('9')">9</button>
    <button class="key blank"></button>
    <button class="key" onclick="kp('0')">0</button>
    <button class="key del" onclick="kd()">⌫</button>
  </div>
  <div class="lock-tip">パスコードを入力してください</div>
</div>

<!-- ═══ APP ═══ -->
<div id="app" style="display:none">

<header class="hd">
  <div class="hd-l">
    <div class="hd-mark">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
        <path d="M10 2L3 7V18H8V13H12V18H17V7L10 2Z" fill="white" opacity=".9"/>
      </svg>
    </div>
    <div>
      <h1>研究室スケジュール</h1>
      <div class="hd-sub">Laboratory Schedule</div>
    </div>
  </div>
  <div class="hd-r">
    <div class="vtog">
      <button id="bw" class="on" onclick="sv('week')">週</button>
      <button id="bm" onclick="sv('month')">月</button>
    </div>
    <span class="sdot" id="sd"></span>
    <span id="stxt"></span>
    <button class="btn p" id="rb" onclick="fetch_ics()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M10 6A4 4 0 012.3 8.5M2 6A4 4 0 019.7 3.5M8.2 2l1.4 1.7-1.9 1.3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      更新
    </button>
  </div>
</header>

<main class="main">
  <div class="pnav">
    <div>
      <div class="plabel" id="pl">―</div>
      <div class="psub" id="ps"></div>
    </div>
    <div class="navbts">
      <button class="nbtn" onclick="nav(-1)">‹</button>
      <button class="btn" onclick="gotd()" style="font-size:11px;padding:5px 12px;">今日</button>
      <button class="nbtn" onclick="nav(1)">›</button>
    </div>
  </div>
  <div id="grid"></div>
  <div class="legend">
    <span style="font-size:10.5px;color:var(--ink-m);font-weight:500;margin-right:4px;">凡例:</span>
    <div class="li"><div class="ld" style="background:#2D5A8B;"></div>予定</div>
    <div class="li"><div class="ld" style="background:#7c5cbf;"></div>会議</div>
    <div class="li"><div class="ld" style="background:#d97706;"></div>セミナー</div>
    <div class="li"><div class="ld" style="background:#16a34a;"></div>講義</div>
    <div class="li"><div class="ld" style="background:#dc2626;"></div>締切</div>
  </div>
</main>

<div class="ov" id="ov" onclick="clov(event)">
  <div class="dcard">
    <button class="dcls" onclick="clovd()">✕</button>
    <div class="dbadge" id="db"></div>
    <div class="dtitle" id="dt"></div>
    <div class="drow"><span class="dico">🗓</span><span id="dd"></span></div>
    <div class="drow" id="dtr"><span class="dico">⏰</span><span id="dtm"></span></div>
    <div class="drow" id="dlr" style="display:none"><span class="dico">📍</span><span id="dl"></span></div>
    <div class="ddesc" id="dds" style="display:none"></div>
  </div>
</div>

<footer>
  <div>Google Calendar iCal フィードと同期（Cloudflare Workers経由）· 5分ごと自動更新</div>
  <div style="font-family:'Space Mono',monospace;font-size:10px;margin-top:2px;" id="lu"></div>
</footer>

<script>

const WORKER_URL = 'https://twilight-mouse-f97a.meruemon.workers.dev/';

const DAYS  = ['日','月','火','水','木','金','土'];
const MONS  = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const DAY_N = ['SU','MO','TU','WE','TH','FR','SA'];

let pin = '', passcode = '';
let offset = 0, view = 'week', expanded = [];

/* ─── LOCK ─── */
function upd() {
  for (let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('on', i<pin.length);
}
function kp(d) {
  if (pin.length>=4) return;
  pin+=d; upd();
  if (pin.length===4) setTimeout(tryAuth,100);
}
function kd() { pin=pin.slice(0,-1); upd(); }

async function tryAuth() {
  if (!WORKER_URL) {
    alert('WORKER_URL が未設定です。\nindex.html の WORKER_URL を設定してください。');
    pin=''; upd(); return;
  }
  ss('spin'); document.getElementById('stxt').textContent='認証中…';

  try {
    const r = await fetch(WORKER_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ passcode: pin, action:'auth' })
    });
    const data = await r.json();
    if (r.status===401) { authFail(); return; }
    if (!r.ok) throw new Error(data.error||`HTTP ${r.status}`);

    // Success
    passcode = pin;
    sessionStorage.setItem('pc', passcode);
    document.getElementById('lock').classList.add('gone');
    document.getElementById('app').style.display='block';
    processICS(data.ics);
    startApp();
  } catch(e) {
    authFail(e.message);
  }
}

function authFail(msg) {
  const dots = document.getElementById('dots');
  dots.classList.add('err');
  setTimeout(()=>{ dots.classList.remove('err'); pin=''; upd(); },500);
  if (msg) console.error('Auth error:', msg);
}

document.addEventListener('keydown', e=>{
  if (document.getElementById('lock').classList.contains('gone')) return;
  if (e.key>='0'&&e.key<='9') kp(e.key);
  if (e.key==='Backspace') kd();
  if (e.key==='Enter'&&pin.length===4) tryAuth();
});

/* ─── ICAL PARSER ─── */
function parseICS(text) {
  // Unfold continuation lines
  const unf = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').replace(/\n[ \t]/g,'');
  const raw = [];
  const blocks = unf.split(/BEGIN:VEVENT/i);

  for (let b=1; b<blocks.length; b++) {
    const block = blocks[b].split(/END:VEVENT/i)[0];
    const P = {}; // property map: key → {val, params}
    const exdateLines = [];

    for (const line of block.split('\n')) {
      const ci = line.indexOf(':');
      if (ci<0) continue;
      const fullKey = line.slice(0,ci);
      const val = line.slice(ci+1).trim();
      const key = fullKey.split(';')[0].toUpperCase();
      const params = fullKey.includes(';') ? fullKey.slice(fullKey.indexOf(';')+1).toUpperCase() : '';
      if (!P[key]) P[key] = {val, params};
      if (key==='EXDATE') exdateLines.push({val, params});
    }

    const rawSummary = unescICS(P['SUMMARY']?.val || '');
    const isBusy = /^busy$/i.test(rawSummary) || rawSummary==='' ||
                   P['CLASS']?.val?.toUpperCase()==='CONFIDENTIAL';
    const summary = isBusy ? '予定あり' : rawSummary;

    const dtsp = P['DTSTART'] || {};
    const dtep = P['DTEND'] || P['DUE'] || {};
    const allDay = dtsp.val?.length===8 || /VALUE=DATE/.test(dtsp.params||'');

    const start = parseDate(dtsp.val||'', dtsp.params||'');
    if (!start) continue;
    const end = parseDate(dtep.val||'', dtep.params||'');

    // RRULE
    const rrule = P['RRULE']?.val || null;

    // EXDATE — collect all (may be comma-separated or multiple lines)
    const exdates = exdateLines.flatMap(el =>
      el.val.split(',').map(v=>parseDate(v.trim(), el.params)).filter(Boolean)
    );

    // RECURRENCE-ID (modified instance)
    const recId = P['RECURRENCE-ID'] ? parseDate(P['RECURRENCE-ID'].val, P['RECURRENCE-ID'].params) : null;

    raw.push({
      uid: P['UID']?.val || Math.random().toString(36),
      summary, isBusy, allDay, start, end, rrule, exdates, recId,
      location:    !isBusy && P['LOCATION']    ? unescICS(P['LOCATION'].val)    : null,
      description: !isBusy && P['DESCRIPTION'] ? unescICS(P['DESCRIPTION'].val) : null,
    });
  }
  return raw;
}

function unescICS(s) {
  return (s||'').replace(/\\n/g,'\n').replace(/\\,/g,',').replace(/\\;/g,';').replace(/\\\\/g,'\\').trim();
}

function parseDate(s, params='') {
  if (!s) return null;
  // Remove any remaining params prefix (e.g., TZID=... left after split)
  // s should already be just the value
  const c = s.replace(/[^0-9TZ]/g,'');
  if (c.length<8) return null;
  const y=+c.slice(0,4), mo=+c.slice(4,6)-1, d=+c.slice(6,8);
  if (c.length===8) return new Date(y,mo,d);
  const h=+(c.slice(9,11)||0), m=+(c.slice(11,13)||0), sc=+(c.slice(13,15)||0);
  return s.endsWith('Z') ? new Date(Date.UTC(y,mo,d,h,m,sc)) : new Date(y,mo,d,h,m,sc);
}

/* ─── RRULE EXPANDER ─── */
function expandAll(rawEvents) {
  // Separate overrides (RECURRENCE-ID) from base events
  const overrides = rawEvents.filter(e=>e.recId);
  const bases     = rawEvents.filter(e=>!e.recId);

  // Map: uid → set of datekeys that have overrides
  const overrideKeys = {};
  const overrideMap  = {};
  for (const ov of overrides) {
    if (!overrideKeys[ov.uid]) overrideKeys[ov.uid]=new Set();
    overrideKeys[ov.uid].add(dk(ov.recId));
    if (!overrideMap[ov.uid]) overrideMap[ov.uid]=[];
    overrideMap[ov.uid].push(ov);
  }

  // Expansion window: 2 years back to 3 years ahead
  const today = new Date(); today.setHours(0,0,0,0);
  const winS = new Date(today.getFullYear()-2, 0, 1);
  const winE = new Date(today.getFullYear()+3, 11, 31);

  const result = [];
  for (const ev of bases) {
    const exKeys = new Set([
      ...(ev.exdates||[]).map(dk),
      ...(overrideKeys[ev.uid]||[]),
    ]);
    result.push(...expandRRule(ev, winS, winE, exKeys));
  }
  // Add override events
  for (const ov of overrides) result.push({...ov, isOverride:true});

  return result;
}

function expandRRule(ev, winS, winE, exKeys) {
  if (!ev.rrule) {
    // Single event — include if it overlaps the window
    const es = ev.start, ee = ev.end||new Date(ev.start.getTime()+(ev.allDay?864e5:36e5));
    return (es<=winE && ee>=winS) ? [ev] : [];
  }

  const P = Object.fromEntries(ev.rrule.split(';').map(p=>{const i=p.indexOf('=');return [p.slice(0,i),p.slice(i+1)];}));
  const freq     = P.FREQ||'DAILY';
  const interval = parseInt(P.INTERVAL||'1',10);
  const maxCount = P.COUNT ? parseInt(P.COUNT,10) : 99999;
  const until    = P.UNTIL ? parseDate(P.UNTIL) : null;
  const byDay    = P.BYDAY ? P.BYDAY.split(',') : null;

  const effEnd = until
    ? new Date(Math.min(until.getTime(), winE.getTime()))
    : winE;

  const dur = ev.end ? ev.end-ev.start : (ev.allDay?864e5:0);
  const occ = [];
  let cnt = 0;

  if (freq==='WEEKLY') {
    const targetDays = byDay
      ? byDay.map(bd=>DAY_N.indexOf(bd.replace(/^[-\d]+/,'')))
      : [ev.start.getDay()];
    const sortedDays = [...new Set(targetDays)].filter(x=>x>=0).sort((a,b)=>a-b);

    let anchor = new Date(ev.start);
    while (anchor<=effEnd && cnt<maxCount) {
      for (const td of sortedDays) {
        const diff = td - anchor.getDay();
        const cand = new Date(anchor);
        cand.setDate(anchor.getDate()+diff);
        cand.setHours(ev.start.getHours(),ev.start.getMinutes(),ev.start.getSeconds(),0);

        if (cand < ev.start) continue;
        if (cand > effEnd) break;
        if (cnt>=maxCount) break;

        if (!exKeys.has(dk(cand))) {
          cnt++;
          occ.push(mkOcc(ev,cand,dur));
        } else {
          cnt++; // still counts toward COUNT
        }
      }
      anchor.setDate(anchor.getDate()+7*interval);
    }

  } else if (freq==='DAILY') {
    let cur = new Date(ev.start);
    while (cur<=effEnd && cnt<maxCount) {
      if (!exKeys.has(dk(cur))) occ.push(mkOcc(ev,cur,dur));
      cnt++;
      cur = new Date(cur); cur.setDate(cur.getDate()+interval);
    }

  } else if (freq==='MONTHLY') {
    let cur = new Date(ev.start);
    const bydayMonthly = byDay; // e.g. ['1MO','-1FR']
    while (cur<=effEnd && cnt<maxCount) {
      let cand = cur;
      if (bydayMonthly) {
        // resolve e.g. 1MO = first Monday of this month
        const resolved = resolveMonthlyByDay(bydayMonthly, cur.getFullYear(), cur.getMonth(),
                                              ev.start.getHours(), ev.start.getMinutes());
        cand = resolved || cur;
      }
      if (cand >= ev.start && cand <= effEnd && !exKeys.has(dk(cand))) {
        occ.push(mkOcc(ev,cand,dur));
      }
      cnt++;
      cur = new Date(cur.getFullYear(), cur.getMonth()+interval, cur.getDate(),
                     cur.getHours(), cur.getMinutes(), cur.getSeconds());
    }

  } else if (freq==='YEARLY') {
    let cur = new Date(ev.start);
    while (cur<=effEnd && cnt<maxCount) {
      if (cur>=ev.start && !exKeys.has(dk(cur))) occ.push(mkOcc(ev,cur,dur));
      cnt++;
      cur = new Date(cur.getFullYear()+interval, cur.getMonth(), cur.getDate(),
                     cur.getHours(), cur.getMinutes(), cur.getSeconds());
    }
  } else {
    // Unsupported freq: include original if in window
    if (ev.start<=winE && ev.start>=winS) occ.push(ev);
  }

  return occ;
}

function resolveMonthlyByDay(byDay, year, month, h, m) {
  for (const bd of byDay) {
    const match = bd.match(/^(-?\d+)?([A-Z]{2})$/);
    if (!match) continue;
    const ord = match[1] ? parseInt(match[1],10) : 1;
    const dayIdx = DAY_N.indexOf(match[2]);
    if (dayIdx<0) continue;

    if (ord>0) {
      // nth occurrence: e.g. 1MO = first Monday
      const d = new Date(year,month,1);
      while (d.getDay()!==dayIdx) d.setDate(d.getDate()+1);
      d.setDate(d.getDate()+(ord-1)*7);
      d.setHours(h,m,0,0);
      if (d.getMonth()===month) return d;
    } else {
      // -nth: count from end, e.g. -1FR = last Friday
      const d = new Date(year,month+1,0); // last day of month
      while (d.getDay()!==dayIdx) d.setDate(d.getDate()-1);
      d.setDate(d.getDate()+(ord+1)*7);
      d.setHours(h,m,0,0);
      if (d.getMonth()===month) return d;
    }
  }
  return null;
}

function mkOcc(base, start, dur) {
  return {
    ...base, rrule:null, exdates:[],
    start: new Date(start),
    end: dur>0 ? new Date(start.getTime()+dur) : null,
  };
}

function dk(d) { return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }

/* ─── EVENTS FOR DAY ─── */
// Returns events that are active on `day`, including multi-day events
function evForDay(evs, day) {
  const ds = new Date(day); ds.setHours(0,0,0,0);
  const de = new Date(day); de.setHours(23,59,59,999);
  return evs.filter(ev=>{
    const es = ev.start;
    const ee = ev.end || new Date(ev.start.getTime()+(ev.allDay?864e5:36e5));
    return es<=de && ee>ds;
  }).sort((a,b)=>a.start-b.start);
}

/* ─── CLASSIFY ─── */
function classify(t='') {
  t=t.toLowerCase();
  if(/会議|ミーティング|meeting|mtg/.test(t)) return 'meeting';
  if(/セミナー|seminar|発表|講演/.test(t))    return 'seminar';
  if(/締切|deadline|提出|due/.test(t))         return 'deadline';
  if(/講義|授業|class|lecture/.test(t))        return 'lecture';
  return 'other';
}
const tlabel = t=>({meeting:'会議',seminar:'セミナー',deadline:'締切',lecture:'講義',other:'予定'})[t]||'予定';
const tcolor = t=>({
  meeting:{bg:'#f0ebfa',c:'#5b3fa0'}, seminar:{bg:'#fef3c7',c:'#b45309'},
  deadline:{bg:'#fee2e2',c:'#991b1b'}, lecture:{bg:'#dcfce7',c:'#15803d'},
  other:{bg:'#f3f4f6',c:'#374151'},
})[t]||{bg:'#f3f4f6',c:'#374151'};

const fmt = d=>`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
const fmtD = d=>`${d.getFullYear()}年${MONS[d.getMonth()]}${d.getDate()}日`;

/* ─── STATUS ─── */
function ss(s) {
  document.getElementById('sd').className='sdot '+s;
  document.getElementById('stxt').textContent={spin:'読み込み中…',live:'更新済み',err:'エラー'}[s]||'';
}

/* ─── RENDER ─── */
function render() { view==='week'?renderWeek():renderMonth(); }

function weekS(off=0) {
  const n=new Date(),dow=n.getDay(),m=new Date(n);
  m.setDate(n.getDate()-dow+1+off*7); m.setHours(0,0,0,0); return m;
}
function monthS(off=0) { const n=new Date(); return new Date(n.getFullYear(),n.getMonth()+off,1); }

function renderWeek() {
  const ws=weekS(offset), we=new Date(ws); we.setDate(ws.getDate()+6);
  document.getElementById('pl').textContent=`${ws.getFullYear()}年${MONS[ws.getMonth()]} — 週`;
  document.getElementById('ps').textContent=`${fmtD(ws)} 〜 ${fmtD(we)}`;

  const today=new Date(); today.setHours(0,0,0,0);
  const g=document.getElementById('grid');
  g.className='wgrid'; g.innerHTML='';

  for(let i=0;i<7;i++){
    const day=new Date(ws); day.setDate(ws.getDate()+i); day.setHours(0,0,0,0);
    const isTd=day.getTime()===today.getTime();
    const isSat=day.getDay()===6, isSun=day.getDay()===0;
    const cell=document.createElement('div');
    cell.className='dcell'+(isTd?' today':'');

    const hdr=document.createElement('div'); hdr.className='dh';
    const dn=document.createElement('div'); dn.className='dname';
    dn.style.color=isSat?'#2D5A8B':isSun?'#dc2626':'';
    dn.textContent=DAYS[day.getDay()]+'曜日';
    const nm=document.createElement('div'); nm.className='dnum';
    nm.style.color=isSat?'#2D5A8B':isSun?'#dc2626':'';
    nm.textContent=day.getDate();
    if(isTd){const dot=document.createElement('span');dot.className='tdot';nm.appendChild(dot);}
    hdr.appendChild(dn); hdr.appendChild(nm); cell.appendChild(hdr);

    buildPills(cell, evForDay(expanded,day), 5, 'pill');
    g.appendChild(cell);
  }
}

function renderMonth() {
  const ms=monthS(offset);
  document.getElementById('pl').textContent=`${ms.getFullYear()}年${MONS[ms.getMonth()]}`;
  document.getElementById('ps').textContent='月間ビュー';

  const today=new Date(); today.setHours(0,0,0,0);
  const g=document.getElementById('grid');
  g.className='mgrid'; g.innerHTML='';

  ['月','火','水','木','金','土','日'].forEach((l,i)=>{
    const h=document.createElement('div');
    h.className='mdow'+(i===5?' sat':i===6?' sun':'');
    h.textContent=l; g.appendChild(h);
  });

  const fd=ms.getDay(), so=fd===0?6:fd-1;
  const cs=new Date(ms); cs.setDate(ms.getDate()-so);

  for(let i=0;i<42;i++){
    const day=new Date(cs); day.setDate(cs.getDate()+i); day.setHours(0,0,0,0);
    const inM=day.getMonth()===ms.getMonth();
    const isTd=day.getTime()===today.getTime();
    const isSat=day.getDay()===6, isSun=day.getDay()===0;
    const cell=document.createElement('div');
    cell.className='mcell'+(!inM?' other':'')+(isTd?' today':'')+(isSat?' sat':'')+(isSun?' sun':'');
    const nm=document.createElement('div'); nm.className='mdn';
    nm.textContent=day.getDate(); cell.appendChild(nm);
    buildPills(cell, evForDay(expanded,day), 3, 'mpill');
    g.appendChild(cell);
  }
}

function buildPills(container, evs, max, cls) {
  const list = document.createElement('div'); list.className='evlist';
  const shown=evs.slice(0,max);
  shown.forEach(ev=>{
    const type=classify(ev.summary);
    const pill=document.createElement('div');
    pill.className=cls+(ev.isBusy?' busy':'')+' t-'+type;
    if(!ev.isBusy) pill.onclick=()=>openDet(ev);
    if(cls==='pill'){
      const ts=ev.allDay?'終日':`${fmt(ev.start)}–${ev.end?fmt(ev.end):''}`;
      pill.innerHTML=`<span class="et">${ts}</span><span class="etitle" title="${esc(ev.summary)}">${ev.summary}</span>`;
    } else {
      const ts=ev.allDay?'':fmt(ev.start)+' ';
      pill.textContent=ts+ev.summary;
      pill.title=(ev.allDay?'終日: ':fmt(ev.start)+': ')+ev.summary;
    }
    list.appendChild(pill);
  });
  if(evs.length>max){
    const m=document.createElement('div'); m.className='more';
    m.textContent=`+${evs.length-max}件`; list.appendChild(m);
  }
  if(evs.length===0&&cls==='pill'){
    const e=document.createElement('div'); e.className='noev'; e.textContent='予定なし';
    list.appendChild(e);
  }
  container.appendChild(list);
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

/* ─── DETAIL ─── */
function openDet(ev){
  const type=classify(ev.summary), c=tcolor(type);
  const b=document.getElementById('db');
  b.textContent=tlabel(type); b.style.background=c.bg; b.style.color=c.c;
  document.getElementById('dt').textContent=ev.summary;
  document.getElementById('dd').textContent=fmtD(ev.start);
  const tr=document.getElementById('dtr');
  if(ev.allDay){tr.style.display='none';}
  else{tr.style.display='flex';document.getElementById('dtm').textContent=`${fmt(ev.start)} 〜 ${ev.end?fmt(ev.end):''}`;}
  const lr=document.getElementById('dlr');
  if(ev.location){lr.style.display='flex';document.getElementById('dl').textContent=ev.location;}
  else lr.style.display='none';
  const dr=document.getElementById('dds');
  if(ev.description){dr.style.display='block';dr.textContent=ev.description;}
  else dr.style.display='none';
  document.getElementById('ov').classList.add('open');
}
function clov(e){if(e.target===document.getElementById('ov'))clovd();}
function clovd(){document.getElementById('ov').classList.remove('open');}

/* ─── NAV ─── */
function sv(v){
  view=v; offset=0;
  document.getElementById('bw').classList.toggle('on',v==='week');
  document.getElementById('bm').classList.toggle('on',v==='month');
  render();
}
function nav(d){offset+=d;render();}
function gotd(){offset=0;render();}

/* ─── FETCH ─── */
async function fetch_ics() {
  if (!WORKER_URL) {
    document.getElementById('grid').innerHTML=`<div class="ebox"><div style="font-size:28px;opacity:.4;margin-bottom:1rem;">⚙</div><div style="font-size:14px;font-weight:500;">WORKER_URL が未設定です</div><div style="font-size:12px;color:var(--ink-m);margin-top:4px;">index.html の WORKER_URL を Cloudflare Worker の URL に変更してください</div></div>`;
    ss('err'); return;
  }
  ss('spin');
  document.getElementById('rb').disabled=true;
  try {
    const r=await fetch(WORKER_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({passcode, action:'data'})
    });
    const data=await r.json();
    if(!r.ok) throw new Error(data.error||`HTTP ${r.status}`);
    processICS(data.ics);
    ss('live');
    const now=new Date();
    document.getElementById('lu').textContent=
      `最終更新: ${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')} — ${expanded.length}件`;
  } catch(e) {
    ss('err');
    document.getElementById('grid').innerHTML=`<div class="ebox"><div style="font-size:28px;opacity:.4;margin-bottom:1rem;">⚠</div><div style="font-size:14px;font-weight:500;">取得できませんでした</div><div style="font-size:12px;color:var(--ink-m);margin-top:4px;font-family:monospace;">${e.message}</div><br><button class="btn" onclick="fetch_ics()" style="margin:auto;">再試行</button></div>`;
  } finally {
    document.getElementById('rb').disabled=false;
  }
}

function processICS(icsText) {
  const raw = parseICS(icsText);
  expanded  = expandAll(raw);
  render();
}

function startApp() {
  render();
  setInterval(fetch_ics, 5*60*1000);
}

/* ─── INIT ─── */
const saved = sessionStorage.getItem('pc');
if (saved) {
  passcode = saved;
  document.getElementById('lock').classList.add('gone');
  document.getElementById('app').style.display='block';
  fetch_ics().then(startApp);
}
</script>
